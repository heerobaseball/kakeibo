<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ふたりの家計簿</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; color: #333; }
        input, textarea, button { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; padding: 12px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        
        /* ドラッグ＆ドロップエリアのデザイン */
        #dropZone {
            border: 2px dashed #007bff;
            border-radius: 5px;
            padding: 30px;
            text-align: center;
            background-color: #f8f9fa;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background-color 0.2s;
        }
        #dropZone.dragover {
            background-color: #e2e6ea;
            border-color: #0056b3;
        }
        #imageInput { display: none; } /* 元のファイル選択ボタンは隠す */
        #fileName { margin-top: 10px; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>
    <h2>レシート登録</h2>
    <form id="uploadForm">
        <label>レシート画像:</label>
        
        <div id="dropZone">
            <p>ここにレシート画像をドラッグ＆ドロップ<br>またはクリックして選択</p>
            <input type="file" id="imageInput" accept="image/*" capture="environment" required>
            <div id="fileName"></div>
        </div>
        
        <label>コメント (例: 妻がクレカで支払い。食費は折半、化粧品は妻負担):</label>
        <textarea id="commentInput" rows="3" placeholder="支払った人や負担割合を入力してください"></textarea>
        
        <button type="submit">AIで解析して登録</button>
    </form>
    
    <div id="result"></div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const imageInput = document.getElementById('imageInput');
        const fileNameDisplay = document.getElementById('fileName');

        // エリアをクリックしたらファイル選択を開く
        dropZone.addEventListener('click', () => imageInput.click());

        // ドラッグ中のデザイン変更
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

        // ドロップされた時の処理
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            
            if (e.dataTransfer.files.length > 0) {
                imageInput.files = e.dataTransfer.files;
                fileNameDisplay.textContent = `選択中: ${e.dataTransfer.files[0].name}`;
            }
        });

        // クリックでファイル選択した時のファイル名表示
        imageInput.addEventListener('change', () => {
            if (imageInput.files.length > 0) {
                fileNameDisplay.textContent = `選択中: ${imageInput.files[0].name}`;
            }
        });

        // フォーム送信処理
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = "Geminiがレシートを解析中...";

            const formData = new FormData();
            formData.append('image', imageInput.files[0]);
            formData.append('comment', document.getElementById('commentInput').value);

            try {
                const response = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await response.json();
                
                if(data.success) {
                    resultDiv.innerHTML = `
                        <p>✅ 登録完了!</p>
                        <ul>
                            <li>内容: ${data.data.description}</li>
                            <li>合計: ${data.data.total_amount}円 (${data.data.payer}払い)</li>
                            <li>夫の負担: ${data.data.husband_burden}円 / 妻の負担: ${data.data.wife_burden}円</li>
                        </ul>
                    `;
                    document.getElementById('uploadForm').reset();
                    fileNameDisplay.textContent = "";
                } else {
                    resultDiv.textContent = "エラーが発生しました: " + data.error;
                }
            } catch (err) {
                resultDiv.textContent = "通信エラーです。";
            }
        });
    </script>
</body>
</html>
