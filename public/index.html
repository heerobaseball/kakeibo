<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ふたりの家計簿</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; color: #333; }
        input, textarea, button { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; padding: 12px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #dropZone { border: 2px dashed #007bff; border-radius: 5px; padding: 30px; text-align: center; background-color: #f8f9fa; cursor: pointer; margin-bottom: 15px; transition: background-color 0.2s; }
        #dropZone.dragover { background-color: #e2e6ea; border-color: #0056b3; }
        #imageInput { display: none; }
        #fileName { margin-top: 10px; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>
    <h2>レシート登録</h2>
    <form id="uploadForm">
        <label>レシート画像:</label>
        <div id="dropZone">
            <p>ここにレシート画像をドラッグ＆ドロップ<br>またはクリックして選択</p>
            <input type="file" id="imageInput" accept="image/*" capture="environment" required>
            <div id="fileName"></div>
        </div>
        
        <label>コメント (例: 妻がクレカで支払い。食費は折半、化粧品は妻負担):</label>
        <textarea id="commentInput" rows="3" placeholder="支払った人や負担割合を入力してください"></textarea>
        
        <button type="submit">AIで解析して登録</button>
    </form>
    
    <div id="result"></div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const imageInput = document.getElementById('imageInput');
        const fileNameDisplay = document.getElementById('fileName');

        dropZone.addEventListener('click', () => imageInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                imageInput.files = e.dataTransfer.files;
                fileNameDisplay.textContent = `選択中: ${e.dataTransfer.files[0].name}`;
            }
        });
        imageInput.addEventListener('change', () => {
            if (imageInput.files.length > 0) fileNameDisplay.textContent = `選択中: ${imageInput.files[0].name}`;
        });

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = "AI解析の準備中...";

            try {
                // 1. セキュリティのため、バックエンドからAPIキーを取得
                const configRes = await fetch('/api/config');
                const configData = await configRes.json();
                if (!configData.apiKey) throw new Error("APIキーが取得できませんでした。");

                resultDiv.textContent = "Geminiがレシートを解析中...";
                
                // 2. スマホ/PC上で画像を読み込む
                const file = imageInput.files[0];
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const base64Image = e.target.result.split(',')[1];
                        const comment = document.getElementById('commentInput').value;

                        // 3. 日本の回線から直接Google AIへ通信！
                        const prompt = `画像はレシートです。ユーザーからのコメント: "${comment}"\nこのレシートの内容とコメントから、以下のJSONフォーマットでデータを出力してください。JSON以外のテキストは含めないでください。\n{\n  "description": "購入した主な品目や店舗名",\n  "total_amount": 合計金額(数値),\n  "payer": "支払った人(夫 or 妻)",\n  "husband_burden": 夫の負担額(数値),\n  "wife_burden": 妻の負担額(数値)\n}`;
                        const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${configData.apiKey}`;
                        const geminiRes = await fetch(geminiUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: file.type, data: base64Image } }] }]
                            })
                        });
                        
                        const geminiData = await geminiRes.json();
                        if (!geminiRes.ok) throw new Error(`Googleエラー: ${geminiData.error?.message || '詳細不明'}`);
                        
                        let resultText = geminiData.candidates[0].content.parts[0].text;
                        resultText = resultText.replace(/```json\n|\n```/g, '');
                        const parsedData = JSON.parse(resultText);

                        resultDiv.textContent = "データをデータベースに保存中...";

                        // 4. 解析結果をCloudflare(データベース)へ送る
                        const saveRes = await fetch('/api/upload', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(parsedData)
                        });
                        
                        const saveData = await saveRes.json();
                        if(saveData.success) {
                            resultDiv.innerHTML = `
                                <p>✅ 登録完了!</p>
                                <ul>
                                    <li>内容: ${saveData.data.description}</li>
                                    <li>合計: ${saveData.data.total_amount}円 (${saveData.data.payer}払い)</li>
                                    <li>夫の負担: ${saveData.data.husband_burden}円 / 妻の負担: ${saveData.data.wife_burden}円</li>
                                </ul>
                            `;
                            document.getElementById('uploadForm').reset();
                            fileNameDisplay.textContent = "";
                        } else {
                            throw new Error(saveData.error);
                        }
                    } catch (err) {
                        resultDiv.textContent = "エラーが発生しました: " + err.message;
                    }
                };
                reader.readAsDataURL(file);

            } catch (err) {
                resultDiv.textContent = "通信エラーです: " + err.message;
            }
        });
    </script>
</body>
</html>
