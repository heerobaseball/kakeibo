<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ふたりの家計簿</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; color: #333; }
        input, textarea, button, select { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; padding: 12px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #dropZone { border: 2px dashed #007bff; border-radius: 5px; padding: 30px; text-align: center; background-color: #f8f9fa; cursor: pointer; margin-bottom: 15px; }
        #dropZone.dragover { background-color: #e2e6ea; border-color: #0056b3; }
        #imageInput { display: none; }
        .tab-btn { background-color: #eee; color: #333; width: 48%; display: inline-block; margin-bottom: 10px; }
        .tab-btn.active { background-color: #007bff; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <a href="/summary.html" style="display:block; text-align:center; margin-bottom: 20px; background:#28a745; color:#fff; padding:12px; text-decoration:none; border-radius:5px; font-weight:bold;">📊 集計結果・履歴を見る</a>
    
    <h2>支出の登録</h2>
    
    <div>
        <button id="tabImage" class="tab-btn active">📷 レシート画像で登録</button>
        <button id="tabText" class="tab-btn">✍️ 文字入力で登録</button>
    </div>

    <form id="uploadForm" class="tab-content active">
        <div id="dropZone">
            <p>レシート画像をドラッグ＆ドロップ<br>またはクリックして選択</p>
            <input type="file" id="imageInput" accept="image/*" capture="environment">
            <div id="fileName" style="margin-top:10px; font-size:0.9em; color:#555;"></div>
        </div>
        <label>コメント (例: 妻がクレカで支払い。食費は折半、化粧品は妻負担):</label>
        <textarea id="commentInputImage" rows="3" placeholder="支払った人や負担割合を入力してください"></textarea>
        <button type="submit">AIで画像解析して登録</button>
    </form>

    <form id="textForm" class="tab-content">
        <label>支出の内容を自由に入力してください:</label>
        <textarea id="textInput" rows="4" placeholder="例: 昨日、スーパーで食料品を3000円夫が支払い。全額夫負担。"></textarea>
        <button type="submit">AIで文字解析して登録</button>
    </form>
    
    <div id="result" style="margin-top: 15px; font-weight: bold;"></div>

    <script>
        document.getElementById('tabImage').addEventListener('click', () => {
            document.getElementById('tabImage').classList.add('active'); document.getElementById('tabText').classList.remove('active');
            document.getElementById('uploadForm').classList.add('active'); document.getElementById('textForm').classList.remove('active');
        });
        document.getElementById('tabText').addEventListener('click', () => {
            document.getElementById('tabText').classList.add('active'); document.getElementById('tabImage').classList.remove('active');
            document.getElementById('textForm').classList.add('active'); document.getElementById('uploadForm').classList.remove('active');
        });

        const dropZone = document.getElementById('dropZone'); const imageInput = document.getElementById('imageInput'); const fileNameDisplay = document.getElementById('fileName');
        dropZone.addEventListener('click', () => imageInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files.length > 0) { imageInput.files = e.dataTransfer.files; fileNameDisplay.textContent = `選択中: ${e.dataTransfer.files[0].name}`; } });
        imageInput.addEventListener('change', () => { if (imageInput.files.length > 0) fileNameDisplay.textContent = `選択中: ${imageInput.files[0].name}`; });

        // 今日の日付を取得してAIに教える（基準日として使うため）
        const todayStr = new Date().toLocaleDateString('ja-JP');

        const basePrompt = `本日は ${todayStr} です。以下の情報を解析し、指定されたJSONフォーマットで出力してください。JSON以外のテキストは絶対に含めないでください。
ルール:
1. "date" は、レシートに印字されている日付、または入力内容から推測される決済日を "YYYY-MM-DD" 形式で出力してください。年が省略されている場合は今年とし、全く推測できない場合は本日の日付にしてください。
2. "payer" (支払った人) は必ず "夫" または "妻" のいずれかに統一してください。
3. "genre" (ジャンル) は以下の4つの中から最も適したものを選んでください: ["食料品、日用品", "外食費", "旅費", "その他"]
フォーマット:
{
  "date": "YYYY-MM-DD",
  "description": "購入した主な品目や店舗名",
  "total_amount": 合計金額(数値),
  "payer": "夫 または 妻",
  "husband_burden": 夫の負担額(数値),
  "wife_burden": 妻の負担額(数値),
  "genre": "選んだジャンル"
}`;

        async function processAI(contentsArray, resultDiv, formElement) {
            try {
                resultDiv.textContent = "AI解析の準備中...";
                const configRes = await fetch('/api/config'); const configData = await configRes.json();
                if (!configData.apiKey) throw new Error("APIキーが取得できません。");

                resultDiv.textContent = "Geminiが解析中...";
                const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${configData.apiKey}`;
                
                const geminiRes = await fetch(geminiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: contentsArray }] }) });
                const geminiData = await geminiRes.json();
                if (!geminiRes.ok) throw new Error(`Googleエラー: ${geminiData.error?.message || '詳細不明'}`);
                
                let resultText = geminiData.candidates[0].content.parts[0].text.replace(/```json\n|\n```/g, '');
                const parsedData = JSON.parse(resultText);

                resultDiv.textContent = "データをデータベースに保存中...";
                const saveRes = await fetch('/api/upload', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(parsedData) });
                const saveData = await saveRes.json();
                
                if(saveData.success) {
                    resultDiv.innerHTML = `<p style="color:green;">✅ 登録完了!</p>決済日: ${saveData.data.date} / 内容: [${saveData.data.genre}] ${saveData.data.description} / 合計: ${saveData.data.total_amount}円`;
                    formElement.reset(); if(fileNameDisplay) fileNameDisplay.textContent = "";
                } else { throw new Error(saveData.error); }
            } catch (err) { resultDiv.textContent = "エラーが発生しました: " + err.message; }
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const file = imageInput.files[0]; if (!file) { alert("画像を選択してください"); return; }
            const prompt = basePrompt + `\n\n【ユーザーコメント】: "${document.getElementById('commentInputImage').value}"\n【画像】: 添付のレシート`;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Image = e.target.result.split(',')[1];
                await processAI([{ text: prompt }, { inline_data: { mime_type: file.type, data: base64Image } }], document.getElementById('result'), document.getElementById('uploadForm'));
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('textForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const text = document.getElementById('textInput').value; if (!text) { alert("支出の内容を入力してください"); return; }
            await processAI([{ text: basePrompt + `\n\n【入力内容】: "${text}"` }], document.getElementById('result'), document.getElementById('textForm'));
        });
    </script>
</body>
</html>
